<!--
  covsight activity bar icon — monochrome silhouette, 16×16 viewport
  VS Code masks this SVG and applies theme color; no fills/strokes other than currentColor
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <!-- Chip outline -->
  <rect x="2" y="3" width="12" height="10" rx="1" fill="none" stroke="currentColor" stroke-width="1"/>
  <!-- Pin top-left -->
  <line x1="5" y1="3" x2="5" y2="1" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
  <!-- Pin top-right -->
  <line x1="11" y1="3" x2="11" y2="1" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
  <!-- Pin bottom-left -->
  <line x1="5" y1="13" x2="5" y2="15" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
  <!-- Pin bottom-right -->
  <line x1="11" y1="13" x2="11" y2="15" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
  <!-- Coverage bars (filled rects representing 90%, 65%, 40%) -->
  <rect x="4" y="5"  width="8" height="1.5" rx="0.5" fill="currentColor" opacity="0.3"/>
  <rect x="4" y="5"  width="7" height="1.5" rx="0.5" fill="currentColor"/>
  <rect x="4" y="7.5" width="8" height="1.5" rx="0.5" fill="currentColor" opacity="0.3"/>
  <rect x="4" y="7.5" width="5" height="1.5" rx="0.5" fill="currentColor"/>
  <rect x="4" y="10"  width="8" height="1.5" rx="0.5" fill="currentColor" opacity="0.3"/>
  <rect x="4" y="10"  width="3" height="1.5" rx="0.5" fill="currentColor"/>
</svg>
