<!--
  covsight icon 32×32 — simplified: 2 pins/side, 3 bars (green/amber/red)
  Chip body: x=6 y=4 w=20 h=15
  Bars h=2.5 pitch=3.5  y: 7, 10.5, 14   track x: 8–24 (w=16)
  Fills: green 90%=14px  amber 72%=11.5px  red 42%=7px
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <clipPath id="cc32">
      <rect x="6.5" y="4.5" width="19" height="14" rx="1.5"/>
    </clipPath>
  </defs>

  <rect width="32" height="32" rx="4.5" fill="#0a192f"/>

  <!-- Chip body -->
  <rect x="6" y="4" width="20" height="15" rx="1.5"
        fill="#0d2240" stroke="#4a8aaa" stroke-width="1"/>

  <!-- Pin-1 dot -->
  <circle cx="8" cy="6" r="0.7" fill="#4a8aaa" opacity="0.7"/>

  <!-- Pins — 2 per side -->
  <!-- top -->
  <line x1="10" y1="4" x2="10" y2="2" stroke="#4a8aaa" stroke-width="1" stroke-linecap="round"/>
  <line x1="22" y1="4" x2="22" y2="2" stroke="#4a8aaa" stroke-width="1" stroke-linecap="round"/>
  <!-- bottom -->
  <line x1="10" y1="19" x2="10" y2="21" stroke="#4a8aaa" stroke-width="1" stroke-linecap="round"/>
  <line x1="22" y1="19" x2="22" y2="21" stroke="#4a8aaa" stroke-width="1" stroke-linecap="round"/>
  <!-- left -->
  <line x1="6" y1="9"  x2="4" y2="9"  stroke="#4a8aaa" stroke-width="1" stroke-linecap="round"/>
  <line x1="6" y1="14" x2="4" y2="14" stroke="#4a8aaa" stroke-width="1" stroke-linecap="round"/>
  <!-- right -->
  <line x1="26" y1="9"  x2="28" y2="9"  stroke="#4a8aaa" stroke-width="1" stroke-linecap="round"/>
  <line x1="26" y1="14" x2="28" y2="14" stroke="#4a8aaa" stroke-width="1" stroke-linecap="round"/>

  <!-- Bar 1 — 90% green -->
  <rect x="8" y="7"    width="16" height="2.5" rx="1.25" fill="#0a2a40" clip-path="url(#cc32)"/>
  <rect x="8" y="7"    width="14" height="2.5" rx="1.25" fill="#22c55e" clip-path="url(#cc32)"/>

  <!-- Bar 2 — 72% amber -->
  <rect x="8" y="10.5" width="16" height="2.5" rx="1.25" fill="#0a2a40" clip-path="url(#cc32)"/>
  <rect x="8" y="10.5" width="11.5" height="2.5" rx="1.25" fill="#f59e0b" clip-path="url(#cc32)"/>

  <!-- Bar 3 — 42% red -->
  <rect x="8" y="14"   width="16" height="2.5" rx="1.25" fill="#0a2a40" clip-path="url(#cc32)"/>
  <rect x="8" y="14"   width="7"  height="2.5" rx="1.25" fill="#ef4444" clip-path="url(#cc32)"/>

  <!-- Wordmark -->
  <text x="16" y="29"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="6" text-anchor="middle" dominant-baseline="auto">
    <tspan font-weight="700" fill="#00c8a8">cov</tspan><tspan fill="#d8ecf6">sight</tspan>
  </text>
</svg>
