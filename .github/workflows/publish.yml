name: Publish to VS Code Marketplace

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ivpm
        run: pip install ivpm

      - name: Fetch dependencies (covsight-core)
        run: python3 -m ivpm update -d default-dev --skip-py-install --anonymous-git

      - name: Build covsight-core
        run: cd packages/covsight-core/ts && npm ci && npm run build

      - name: Install npm dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx vsce publish --no-dependencies -p "$VSCE_PAT"
